<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System with LocalStorage</title>
    <link rel="stylesheet" href="testing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div id="register-view" class="form-container">
            <h2>Create Account</h2>
            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe">
                    <small class="error-msg"></small>
                </div>
                
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="john@example.com">
                    <small class="error-msg"></small>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" placeholder="Min 6 chars">
                        <i class="fa-solid fa-eye toggle-password" data-target="reg-password"></i>
                    </div>
                    <small class="error-msg"></small>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-confirm" placeholder="Confirm password">
                        <i class="fa-solid fa-eye toggle-password" data-target="reg-confirm"></i>
                    </div>
                    <small class="error-msg"></small>
                </div>

                <button type="submit" class="btn">Register</button>
                <p class="switch-text">Already have an account? <a href="#" id="link-login">Login</a></p>
            </form>
        </div>

        <div id="login-view" class="form-container hidden">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="john@example.com">
                    <small class="error-msg"></small>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" placeholder="Enter password">
                        <i class="fa-solid fa-eye toggle-password" data-target="login-password"></i>
                    </div>
                    <small class="error-msg"></small>
                </div>

                <button type="submit" class="btn">Login</button>
                <p class="switch-text">Don't have an account? <a href="#" id="link-register">Register</a></p>
            </form>
        </div>

        <div id="dashboard-view" class="dashboard-container hidden">
            <h1>Welcome, <span id="user-name-display">User</span>!</h1>
            <p>You have successfully logged in.</p>
            <button id="logout-btn" class="btn btn-outline">Logout</button>
        </div>
    </div>

    <script src="testing.js"></script>
</body>
</html>
